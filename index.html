<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGeotab Add-Ins</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1a237e;
      color: #fff;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    header p {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .install-instructions {
      max-width: 880px;
      margin: 1.5rem auto 0;
      padding: 0 1.5rem;
    }

    .install-instructions details {
      background: #fff;
      border: 1px solid #dde1e6;
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    .install-instructions summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      color: #1a237e;
    }

    .install-instructions ol {
      margin-top: 0.75rem;
      padding-left: 1.25rem;
      line-height: 1.7;
      font-size: 0.9rem;
    }

    .install-instructions code {
      background: #eef0f4;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      max-width: 880px;
      margin: 1.25rem auto 2rem;
      padding: 0 1.5rem;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.4rem; }
    }

    .card {
      background: #fff;
      border: 1px solid #dde1e6;
      border-radius: 8px;
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.25rem;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1a237e;
    }

    .card-version {
      font-size: 0.8rem;
      color: #6b7280;
    }

    .card-menu {
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.88rem;
      color: #4b5563;
      line-height: 1.45;
      flex: 1;
      margin-bottom: 0.75rem;
    }

    .card-url {
      font-size: 0.72rem;
      color: #6b7280;
      word-break: break-all;
      margin-bottom: 0.65rem;
      font-family: "SF Mono", Monaco, Consolas, monospace;
    }

    .copy-btn {
      align-self: flex-start;
      background: #2e7d32;
      color: #fff;
      border: none;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .copy-btn:hover { background: #1b5e20; }

    .copy-btn.copied {
      background: #388e3c;
      pointer-events: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    footer a { color: #6b7280; }
  </style>
</head>
<body>
  <header>
    <h1>MyGeotab Add-Ins</h1>
    <p>Custom add-ins hosted on GitHub Pages</p>
  </header>

  <div class="install-instructions">
    <details open>
      <summary>How to install an add-in</summary>
      <ol>
        <li>In MyGeotab, go to <strong>Administration &gt; System &gt; Add-Ins</strong></li>
        <li>Click the <strong>+</strong> button to add a new add-in</li>
        <li>Choose <strong>"Add custom add-in from URL"</strong></li>
        <li>Paste the <code>config.json</code> URL from below and click <strong>OK</strong></li>
      </ol>
    </details>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <a href="https://github.com/shivamagnihotri647/mygeotab-addins" target="_blank" rel="noopener">GitHub Repository</a>
  </footer>

  <script>
    var addins = [
      {
        name: "Bulk Exception Dismiss",
        version: "1.0.0",
        menu: "Rules & Groups",
        desc: "Select and dismiss multiple exceptions at once instead of one at a time.",
        configUrl: "https://shivamagnihotri647.github.io/mygeotab-addins/bulk-exception-dismiss/config.json"
      },
      {
        name: "Bulk Exception Dismiss (React)",
        version: "2.0.0",
        menu: "Rules & Groups",
        desc: "React-based version with improved UI for bulk-dismissing exceptions.",
        configUrl: "https://shivamagnihotri647.github.io/mygeotab-addins/bulk-exception-dismiss-react/config.json"
      },
      {
        name: "Bulk Group Deletion",
        version: "1.0.0",
        menu: "Groups",
        desc: "Select and delete multiple groups in bulk with a single operation.",
        configUrl: "https://shivamagnihotri647.github.io/mygeotab-addins/bulk-group-deletion/config.json"
      },
      {
        name: "Bulk User Upload",
        version: "1.0.0",
        menu: "Administration",
        desc: "Upload users in bulk from a CSV file with group and security clearance mapping.",
        configUrl: "https://shivamagnihotri647.github.io/mygeotab-addins/bulk-user-upload/config.json"
      },
      {
        name: "Bulk User Group Update",
        version: "1.0.0",
        menu: "Administration",
        desc: "Update group assignments for multiple users at once via CSV.",
        configUrl: "https://shivamagnihotri647.github.io/mygeotab-addins/bulk-user-group-update/config.json"
      }
    ];

    var grid = document.getElementById("grid");

    addins.forEach(function (addin) {
      var card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<div class="card-header">' +
          '<span class="card-name">' + addin.name + '</span>' +
          '<span class="card-version">v' + addin.version + '</span>' +
        '</div>' +
        '<div class="card-menu">' + addin.menu + '</div>' +
        '<div class="card-desc">' + addin.desc + '</div>' +
        '<div class="card-url">' + addin.configUrl + '</div>' +
        '<button class="copy-btn" data-url="' + addin.configUrl + '">Copy Config URL</button>';
      grid.appendChild(card);
    });

    grid.addEventListener("click", function (e) {
      if (!e.target.classList.contains("copy-btn")) return;
      var btn = e.target;
      var url = btn.getAttribute("data-url");
      navigator.clipboard.writeText(url).then(function () {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(function () {
          btn.textContent = "Copy Config URL";
          btn.classList.remove("copied");
        }, 2000);
      });
    });
  </script>
</body>
</html>
